<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Complaint | MaintainIQ</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="public-page">
    <div class="public-card glass-card" style="width:min(720px,100%);">
      <div class="public-header">
        <h1>⚙️ MaintainIQ</h1>
        <h2 style="font-size:20px;margin-top:8px;">Submit a Complaint</h2>
        <p>Anyone can report a maintenance issue — no login required</p>
      </div>

      <!-- Asset selection -->
      <div id="asset-select-wrap" class="form-group">
        <label>Select Asset</label>
        <select id="asset-select" class="select" required></select>
        <div style="display:flex;gap:10px;margin-top:10px;">
          <input id="asset-code-input" class="input" placeholder="enter code ">
          <button type="button" id="asset-code-search" class="btn-secondary">Find</button>
        </div>
      </div>

      <p id="asset-info" class="hint-text" style="margin-bottom:16px;">Select an asset to continue</p>

      <!-- Step 1: Describe issue -->
      <div id="step-complaint" style="display:none;">
        <div class="form-group">
          <label>Describe the problem</label>
          <textarea id="raw-complaint" class="input" rows="4" placeholder="e.g. The AC is leaking water and cooling is weak."></textarea>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button type="button" id="ai-triage-btn" class="btn-primary">🤖 AI Analyze</button>
          <button type="button" id="skip-ai-btn" class="btn-secondary">Skip AI — Fill Manually</button>
        </div>
      </div>

      <div id="ai-loading" style="display:none;" class="loading-state">
        <div class="spinner"></div><p>AI analyzing complaint...</p>
      </div>

      <!-- Complaint form -->
      <form id="issue-form" class="form-grid" style="grid-template-columns:1fr;display:none;">
        <div id="ai-suggestions" class="ai-panel"></div>
        <div class="form-group"><label>Your Name *</label><input id="reporter-name" class="input" required></div>
        <div class="form-group"><label>Email *</label><input id="reporter-email" type="email" class="input" required></div>
        <div class="form-group"><label>Phone *</label><input id="reporter-phone" class="input" required></div>
        <div class="form-group"><label>Issue Title *</label><input id="issue-title" class="input" required></div>
        <div class="form-group"><label>Description *</label><textarea id="issue-desc" class="input" rows="3" required></textarea></div>
        <div class="form-group">
          <label>Priority</label>
          <select id="issue-priority" class="select" required>
            <option>Low</option><option>Medium</option><option>High</option><option>Critical</option>
          </select>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="issue-category" class="select" required></select>
        </div>
        <div class="form-group">
          <label>Photo Evidence (optional)</label>
          <input id="issue-image" type="file" accept="image/*" class="input">
        </div>
        <div class="form-group" style="display:flex;gap:10px;">
          <button type="button" id="retry-ai" class="btn-secondary">← Back</button>
          <button type="submit" class="btn-primary" id="submit-btn">Submit Complaint to Firebase</button>
        </div>
      </form>

      <div id="success-msg" style="display:none;text-align:center;padding:24px;">
        <span class="empty-icon">✅</span>
        <h3>Complaint Submitted Successfully!</h3>
        <p id="issue-number-display"></p>
        <p class="hint-text">Admin & technician will see this in their panel immediately.</p>
        <a id="track-link" class="btn-primary" style="margin-top:16px;display:inline-block;">Track Issue Status</a>
        <br><a href="submit-complaint.html" class="btn-secondary" style="margin-top:10px;display:inline-block;">Submit Another</a>
      </div>

      <p style="text-align:center;margin-top:20px;">
        <a href="index.html" style="color:var(--primary);">← Back to Home</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { initSubmitComplaintPage } from './js/submitComplaint.js';
    initSubmitComplaintPage();
  </script>
</body>
</html>
