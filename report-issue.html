<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Issue | MaintainIQ</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="public-page">
    <div class="public-card glass-card" style="width:min(720px,100%);">
      <div class="public-header">
        <h1>Report Issue</h1>
        <p id="asset-info">Loading asset...</p>
      </div>

      <div id="asset-select-wrap" style="display:none;"></div>

      <div id="step-complaint" style="display:none;">
        <div class="form-group">
          <label>Describe the problem</label>
          <textarea id="raw-complaint" class="input" rows="4" placeholder="Describe the issue..."></textarea>
        </div>
        <div style="display:flex;gap:10px;">
          <button type="button" id="ai-triage-btn" class="btn-primary">🤖 AI Analyze</button>
          <button type="button" id="skip-ai-btn" class="btn-secondary">Fill Manually</button>
        </div>
      </div>

      <div id="ai-loading" style="display:none;" class="loading-state"><div class="spinner"></div><p>AI analyzing...</p></div>

      <form id="issue-form" class="form-grid" style="grid-template-columns:1fr;display:none;">
        <div id="ai-suggestions" class="ai-panel"></div>
        <div class="form-group"><label>Name</label><input id="reporter-name" class="input" required></div>
        <div class="form-group"><label>Email</label><input id="reporter-email" type="email" class="input" required></div>
        <div class="form-group"><label>Phone</label><input id="reporter-phone" class="input" required></div>
        <div class="form-group"><label>Title</label><input id="issue-title" class="input" required></div>
        <div class="form-group"><label>Description</label><textarea id="issue-desc" class="input" rows="3" required></textarea></div>
        <div class="form-group"><label>Priority</label><select id="issue-priority" class="select"><option>Low</option><option>Medium</option><option>High</option><option>Critical</option></select></div>
        <div class="form-group"><label>Category</label><select id="issue-category" class="select" required></select></div>
        <div class="form-group"><label>Photo (optional)</label><input id="issue-image" type="file" accept="image/*" class="input"></div>
        <div class="form-group"><button type="button" id="retry-ai" class="btn-secondary">← Back</button> <button type="submit" class="btn-primary" id="submit-btn">Submit Complaint</button></div>
      </form>

      <div id="success-msg" style="display:none;text-align:center;padding:20px;">
        <span class="empty-icon">✅</span><h3>Submitted!</h3>
        <p id="issue-number-display"></p>
        <a id="track-link" class="btn-primary" style="margin-top:12px;display:inline-block;">Track Status</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initReportIssuePage } from './js/submitComplaint.js';
    initReportIssuePage();
  </script>
</body>
</html>
