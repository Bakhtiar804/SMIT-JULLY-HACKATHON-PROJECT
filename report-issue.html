<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Issue | MaintainIQ</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="public-page">
    <div class="public-card glass-card" style="width:min(640px,100%);">
      <div class="public-header">
        <h1>Report Issue</h1>
        <p id="asset-info">Loading asset...</p>
      </div>

      <form id="issue-form" class="form-grid" style="grid-template-columns:1fr;">
        <div class="form-group"><label>Reporter Name</label><input id="reporter-name" class="input" required></div>
        <div class="form-group"><label>Email</label><input id="reporter-email" type="email" class="input" required></div>
        <div class="form-group"><label>Phone</label><input id="reporter-phone" class="input" required></div>
        <div class="form-group"><label>Issue Title</label><input id="issue-title" class="input" required></div>
        <div class="form-group"><label>Description</label><textarea id="issue-desc" class="input" rows="4" required></textarea></div>
        <div class="form-group">
          <label>Priority</label>
          <select id="issue-priority" class="select" required>
            <option>Low</option><option>Medium</option><option>High</option><option>Critical</option>
          </select>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="issue-category" class="select" required>
            <option>Mechanical</option><option>Electrical</option><option>Software</option><option>Safety</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Image Upload (Optional)</label>
          <input id="issue-image" type="file" accept="image/*" class="input">
        </div>
        <div class="form-group">
          <button type="submit" class="btn-primary" id="submit-btn">Submit Complaint</button>
        </div>
      </form>
      <div id="success-msg" class="hidden" style="display:none;text-align:center;padding:20px;">
        <span class="empty-icon">✅</span>
        <h3>Issue Submitted!</h3>
        <p id="issue-number-display"></p>
      </div>
    </div>
  </div>

  <script type="module">
    import { loadPublicAsset } from './js/publicAsset.js';
    import { submitIssue } from './js/complaints.js';
    import { showToast } from './js/utils.js';

    let assetData = null;

    (async () => {
      try {
        const { asset, assetId } = await loadPublicAsset();
        assetData = { ...asset, assetId };
        document.getElementById('asset-info').textContent = `${asset.name} (${asset.assetCode}) — ${asset.location}`;
      } catch (err) {
        document.getElementById('asset-info').textContent = err.message;
        document.getElementById('submit-btn').disabled = true;
      }
    })();

    document.getElementById('issue-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!assetData) return;

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      try {
        const result = await submitIssue({
          reporterName: document.getElementById('reporter-name').value,
          reporterEmail: document.getElementById('reporter-email').value,
          reporterPhone: document.getElementById('reporter-phone').value,
          title: document.getElementById('issue-title').value,
          description: document.getElementById('issue-desc').value,
          priority: document.getElementById('issue-priority').value,
          category: document.getElementById('issue-category').value,
          assetCode: assetData.assetCode,
          assetName: assetData.name,
          imageFile: document.getElementById('issue-image').files[0] || null
        }, assetData.assetId);

        document.getElementById('issue-form').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
        document.getElementById('issue-number-display').textContent = `Your issue number: ${result.issueNumber}`;
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Submit Complaint';
      }
    });
  </script>
</body>
</html>
