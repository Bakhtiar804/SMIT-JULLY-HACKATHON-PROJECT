<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | MaintainIQ</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main-content">
      <header class="topbar">
        <div class="page-heading">
          <button id="menu-toggle" class="menu-toggle" type="button">☰</button>
          <h1 id="page-title">Profile</h1>
          <p id="page-subtitle">Manage your account settings</p>
        </div>
      </header>

      <section class="panel glass-card" style="max-width:640px;">
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;">
          <div id="profile-avatar" class="avatar" style="width:64px;height:64px;font-size:24px;">U</div>
          <div>
            <h2>My Profile</h2>
            <span class="role-badge" id="profile-role">—</span>
          </div>
        </div>

        <form id="profile-form" class="form-grid" style="grid-template-columns:1fr;">
          <div class="form-group">
            <label for="profile-name">Full Name</label>
            <input id="profile-name" class="input" required>
          </div>
          <div class="form-group">
            <label for="profile-email">Email</label>
            <input id="profile-email" type="email" class="input" required>
          </div>
          <div class="form-group">
            <label for="profile-phone">Phone</label>
            <input id="profile-phone" class="input">
          </div>
          <div class="form-group">
            <label for="profile-dept">Department</label>
            <input id="profile-dept" class="input">
          </div>
          <div class="form-group">
            <button type="submit" class="btn-primary">Save Changes</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script type="module">
    import { initProfilePage } from './js/profile.js';
    initProfilePage();
  </script>
</body>
</html>
