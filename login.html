<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackathon Auth Portal</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bootstrap Icons for Google & GitHub logos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="login.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

    <div class="auth-container">

        <!-- --- LOGIN FORM --- -->
        <div id="login-form">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Enter your details to access your account</p>
            </div>

            <form id="firebase-login-submit" onsubmit="event.preventDefault()">
                <div class="form-group mb-3">
                    <label for="signin-email">Email Address</label>
                    <input type="email" id="signin-email" placeholder="name@example.com" class="form-control">
                </div>

                <div class="form-group mb-3">
                    <label for="signin-pass">Password</label>
                    <input type="password" id="signin-pass" placeholder="••••••••" class="form-control">
                </div>

                <button type="submit" id="signin-btn" class="submit-btn w-100 btn btn-primary">Sign In</button>
            </form>

            <!-- Social Provider Divider -->
            <div class="text-center my-3 text-muted position-relative or-separator">
                <hr>
                <span class="bg-white px-2 position-absolute top-50 start-50 translate-middle" style="z-index: 1;">Or continue with</span>
            </div>

            <!-- Social Login Buttons -->
            <div class="d-flex gap-2 mb-3">
                <button type="button" id="google-signin" class="btn btn-outline-danger w-50 d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-google"></i> Google
                </button>
                <button type="button" id="github-signin" class="btn btn-outline-dark w-50 d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-github"></i> GitHub
                </button>
            </div>

            <div class="switch-form text-center">
                Don't have an account? <a href="#" onclick="toggleForm()">Sign Up</a>
            </div>
        </div>

        <!-- --- SIGNUP FORM --- -->
        <div id="signup-form" class="hidden">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join the community and start building</p>
            </div>

            <form id="firebase-signup-submit" onsubmit="event.preventDefault()">
                <div class="form-group mb-3">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" placeholder="John Doe" class="form-control">
                </div>

                <div class="form-group mb-3">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" placeholder="name@example.com" class="form-control">
                </div>

                <div class="form-group mb-3">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" placeholder="••••••••" class="form-control">
                </div>

                <div class="form-group mb-3">
                    <label for="signup-role">Select Role</label>
                    <select id="signup-role" class="form-select">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <button type="submit" id="signup-btn" class="submit-btn w-100 btn btn-primary">Register</button>
            </form>

            <!-- Social Provider Divider -->
            <div class="text-center my-3 text-muted position-relative or-separator">
                <hr>
                <span class="bg-white px-2 position-absolute top-50 start-50 translate-middle" style="z-index: 1;">Or sign up with</span>
            </div>

            <!-- Social Signup Buttons -->
            <div class="d-flex gap-2 mb-3">
                <button type="button" id="google-signup" class="btn btn-outline-danger w-50 d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-google"></i> Google
                </button>
                <button type="button" id="github-signup" class="btn btn-outline-dark w-50 d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-github"></i> GitHub
                </button>
            </div>

            <div class="switch-form text-center">
                Already have an account? <a href="#" onclick="toggleForm()">Sign In</a>
            </div>
        </div>

    </div>

    <!-- Toggle Form Logic -->
    <script>
        function toggleForm() {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');

            loginForm.classList.toggle('hidden');
            signupForm.classList.toggle('hidden');
        }
    </script>
    
    <script type="module" src="login.js"></script>
    
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
