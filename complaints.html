<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complaints | MaintainIQ</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main-content">
      <header class="topbar">
        <div class="page-heading">
          <button id="menu-toggle" class="menu-toggle" type="button">☰</button>
          <h1 id="page-title">Complaint Management</h1>
          <p id="page-subtitle"></p>
        </div>
        <div class="topbar-actions">
          <div class="notif-wrap" id="notif-wrap">
            <button class="notif-btn" type="button" onclick="this.parentElement.classList.toggle('open')">🔔 <span id="notif-badge">0</span></button>
            <div class="notif-dropdown glass-card" id="notif-list"></div>
          </div>
        </div>
      </header>

      <section class="panel glass-card">
        <div class="filters">
          <input type="text" id="issue-search" class="input" placeholder="Search by issue #, asset, reporter...">
          <select id="issue-status-filter" class="select">
            <option value="">All Statuses</option>
            <option>Reported</option>
            <option>Assigned</option>
            <option>Inspection Started</option>
            <option>Under Maintenance</option>
            <option>Resolved</option>
            <option>Closed</option>
            <option>Reopened</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Issue #</th><th>Asset</th><th>Reporter</th><th>Priority</th>
                <th>Status</th><th>Technician</th><th>Date</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="issues-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="issue-modal" class="modal">
    <div class="modal-content glass-card">
      <button id="modal-close" class="modal-close" type="button">&times;</button>
      <h2 id="modal-title" style="margin-bottom:16px;">Issue Details</h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module">
    import { initComplaintsPage } from './js/admin.js';
    initComplaintsPage();
  </script>
</body>
</html>
