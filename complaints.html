<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Complaints | MaintainIQ</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main-content">
      <header class="topbar">
        <div class="page-heading">
          <button id="menu-toggle" class="menu-toggle" type="button">☰</button>
          <h1 id="page-title">Complaint Management</h1>
          <p id="page-subtitle"></p>
        </div>
        <div class="topbar-actions">
          <a href="submit-complaint.html" target="_blank" class="btn-secondary">Public Complaint Link</a>
          <div class="notif-wrap">
            <button class="notif-btn" type="button" onclick="this.parentElement.classList.toggle('open')">🔔 <span id="notif-badge">0</span></button>
            <div class="notif-dropdown glass-card" id="notif-list"></div>
          </div>
        </div>
      </header>

      <div class="metrics-grid" style="margin-bottom:20px;">
        <div class="metric-card glass-card"><div><h3>Open Complaints</h3><p id="stat-open">0</p></div><span class="metric-icon">🎫</span></div>
        <div class="metric-card glass-card"><div><h3>Awaiting Assignment</h3><p id="stat-reported">0</p></div><span class="metric-icon">📋</span></div>
      </div>

      <section class="panel glass-card">
        <div class="filters">
          <input type="text" id="issue-search" class="input" placeholder="Search issue #, asset, reporter...">
          <select id="issue-status-filter" class="select">
            <option value="">All Statuses</option>
            <option>Reported</option><option>Assigned</option><option>Inspection Started</option>
            <option>Maintenance In Progress</option><option>Waiting for Parts</option>
            <option>Resolved</option><option>Closed</option><option>Reopened</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Issue #</th><th>Asset</th><th>Reporter</th><th>Priority</th>
                <th>Status</th><th>Technician</th><th>Date</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="issues-body">
              <tr><td colspan="8"><div class="loading-state"><div class="spinner"></div><p>Loading complaints from Firebase...</p></div></td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- View modal -->
  <div id="issue-modal" class="modal">
    <div class="modal-content glass-card">
      <button id="modal-close" class="modal-close" type="button">&times;</button>
      <h2 id="modal-title">Issue Details</h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Assign modal -->
  <div id="assign-modal" class="modal">
    <div class="modal-content glass-card">
      <button class="modal-close" type="button" data-close="assign-modal">&times;</button>
      <h2>Assign Technician</h2>
      <form id="assign-form">
        <div class="form-group">
          <label>Select Technician</label>
          <select id="tech-select" class="select" required></select>
        </div>
        <button type="submit" class="btn-primary">Assign & Notify</button>
      </form>
    </div>
  </div>

  <!-- Note modal -->
  <div id="note-modal" class="modal">
    <div class="modal-content glass-card">
      <button class="modal-close" type="button" data-close="note-modal">&times;</button>
      <h2>Add Maintenance Note</h2>
      <form id="note-form">
        <div class="form-group">
          <label>Inspection / Maintenance Note</label>
          <textarea id="note-text" class="input" rows="4" required placeholder="e.g. HDMI cable is damaged, needs replacement."></textarea>
        </div>
        <button type="submit" class="btn-primary">Save Note</button>
      </form>
    </div>
  </div>

  <!-- Resolve modal -->
  <div id="resolve-modal" class="modal">
    <div class="modal-content glass-card">
      <button class="modal-close" type="button" data-close="resolve-modal">&times;</button>
      <h2>Resolve Issue</h2>
      <p id="resolve-issue-title" style="margin-bottom:16px;color:var(--text-muted);"></p>
      <form id="resolve-form">
        <div class="form-group">
          <label>Maintenance Notes *</label>
          <textarea id="resolve-notes" class="input" rows="3" required placeholder="What was done to fix the issue?"></textarea>
        </div>
        <div class="form-group">
          <label>Parts Replaced</label>
          <input id="resolve-parts" class="input" placeholder="e.g. HDMI Cable 2m">
        </div>
        <div class="form-group">
          <label>Maintenance Cost (PKR)</label>
          <input id="resolve-cost" type="number" min="0" step="0.01" class="input" value="0">
        </div>
        <button type="submit" class="btn-primary success">Mark as Resolved</button>
      </form>
    </div>
  </div>

  <!-- Summary modal -->
  <div id="summary-modal" class="modal">
    <div class="modal-content glass-card">
      <button class="modal-close" type="button" data-close="summary-modal">&times;</button>
      <h2>✅ Issue Resolved</h2>
      <div class="ai-box" style="margin-top:16px;">
        <label>AI Maintenance Summary</label>
        <p id="summary-text"></p>
      </div>
      <button type="button" class="btn-primary" data-close="summary-modal" style="margin-top:16px;">Done</button>
    </div>
  </div>

  <script type="module">
    import { initComplaintsPage } from './js/admin.js';
    initComplaintsPage();
  </script>
</body>
</html>
