<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | MaintainIQ</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>
    <main class="main-content">
      <header class="topbar">
        <div class="page-heading">
          <button id="menu-toggle" class="menu-toggle" type="button">☰</button>
          <h1 id="page-title">Dashboard</h1>
          <p id="page-subtitle"></p>
        </div>
        <div class="topbar-actions">
          <div class="notif-wrap" id="notif-wrap">
            <button class="notif-btn" type="button" onclick="this.parentElement.classList.toggle('open')">🔔 <span id="notif-badge">0</span></button>
            <div class="notif-dropdown glass-card" id="notif-list"></div>
          </div>
        </div>
      </header>

      <section class="metrics-grid">
        <div class="metric-card glass-card"><div><h3>Total Assets</h3><p id="metric-total">0</p></div><span class="metric-icon">📦</span></div>
        <div class="metric-card glass-card"><div><h3>Active Assets</h3><p id="metric-active">0</p></div><span class="metric-icon">✅</span></div>
        <div class="metric-card glass-card"><div><h3>Under Maintenance</h3><p id="metric-maintenance">0</p></div><span class="metric-icon">🔧</span></div>
        <div class="metric-card glass-card"><div><h3>Issue Reported</h3><p id="metric-reported">0</p></div><span class="metric-icon">⚠️</span></div>
        <div class="metric-card glass-card"><div><h3>Retired Assets</h3><p id="metric-retired">0</p></div><span class="metric-icon">🗄️</span></div>
      </section>

      <div class="grid-2">
        <section class="panel glass-card">
          <div class="panel-header"><h2>Recent Activities</h2></div>
          <div id="recent-activity"></div>
        </section>
        <section class="panel glass-card">
          <div class="panel-header"><h2>Latest Issues</h2></div>
          <div id="latest-issues"></div>
        </section>
      </div>

      <section class="panel glass-card">
        <div class="panel-header"><h2>Quick Actions</h2></div>
        <div class="quick-actions">
          <button class="btn-primary" data-quick="asset-form.html">+ Create Asset</button>
          <button class="btn-secondary" data-quick="assets.html">Manage Assets</button>
          <button class="btn-secondary" data-quick="complaints.html">View Complaints</button>
        </div>
      </section>

      <section class="panel glass-card">
        <div class="panel-header"><h2>Search Assets</h2></div>
        <div class="filters">
          <input type="text" id="asset-search" class="input" placeholder="Search by name, code or location...">
          <select id="status-filter" class="select">
            <option value="">All Statuses</option>
            <option>Active</option>
            <option>Under Maintenance</option>
            <option>Issue Reported</option>
            <option>Retired</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Code</th><th>Category</th><th>Status</th><th></th></tr></thead>
            <tbody id="asset-search-results"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script type="module">
    import { initDashboard } from './js/dashboard.js';
    initDashboard();
  </script>
</body>
</html>
